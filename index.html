<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Chat Viewer & Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #efeae2;
            --card-bg: #ffffff;
            --primary: #00a884;
            --text-primary: #111b21;
            --text-secondary: #667781;
            --border-color: #e9edef;
            --outgoing-bg: #d9fdd3;
            --incoming-bg: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-primary);
            height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px;
        }
        .app-container {
            width: 100%; max-width: 1200px; height: 95vh;
            background: var(--card-bg); border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1); display: flex; overflow: hidden;
        }
        .sidebar { width: 35%; background: #ffffff; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .sidebar-header { padding: 16px; background: #f0f2f5; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; }
        .sidebar-header h2 { font-size: 16px; color: var(--text-primary); }
        
        .settings-box { background: #ffffff; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 6px; font-size: 13px; }
        .settings-box input, .settings-box select { width: 100%; padding: 6px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px; }

        .upload-box {
            background: #e7f8f5; border: 2px dashed var(--primary); padding: 8px;
            border-radius: 6px; text-align: center; cursor: pointer; font-size: 12px; color: #005c4b; font-weight: 600;
        }
        .upload-box input { display: none; }

        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px 16px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: background 0.2s; }
        .contact-item:hover, .contact-item.active { background: #f0f2f5; }
        .contact-name { font-weight: 600; font-size: 14px; text-transform: uppercase; }
        .contact-meta { font-size: 11px; color: var(--text-secondary); }

        .chat-area { flex: 65%; display: flex; flex-direction: column; background: var(--bg-color); }
        .chat-header { padding: 12px 20px; background: #f0f2f5; border-bottom: 1px solid var(--border-color); font-weight: 600; font-size: 15px; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        
        .message-bubble {
            max-width: 75%; padding: 8px 12px; border-radius: 8px;
            font-size: 13px; line-height: 1.4; word-wrap: break-word; white-space: pre-wrap;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); display: flex; flex-direction: column;
        }
        .message-bubble.outgoing { background: var(--outgoing-bg); align-self: flex-end; }
        .message-bubble.incoming { background: var(--incoming-bg); align-self: flex-start; }
        
        .message-sender { font-size: 11px; font-weight: bold; color: #005c4b; margin-bottom: 2px; }
        .message-time { font-size: 9px; color: var(--text-secondary); text-align: right; margin-top: 3px; }
        .empty-state { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; color: var(--text-secondary); text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Arsip WhatsApp</h2>
            <div class="settings-box">
                <label>Nama Anda di WhatsApp:</label>
                <input type="text" id="myNameInput" placeholder="Ketik nama persis seperti di WA">
                <label>Posisi Chat Saya:</label>
                <select id="myPositionSelect">
                    <option value="right">Saya di Kanan (Standar WA)</option>
                    <option value="left">Saya di Kiri</option>
                </select>
            </div>
            <label class="upload-box">
                📁 Upload File ZIP WhatsApp
                <input type="file" id="zipInput" accept=".zip">
            </label>
        </div>
        <div class="contact-list" id="contactList">
            <div style="padding:20px; text-align:center; color:#667781; font-size:13px;">Silakan upload file ZIP Anda.</div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chatHeader"><span>Pilih kontak di samping</span></div>
        <div class="chat-messages" id="chatMessages">
            <div class="empty-state">
                <h3>Belum ada chat yang dipilih</h3>
                <p>Atur nama Anda di panel kiri, lalu pilih chat untuk melihat tampilannya.</p>
            </div>
        </div>
    </div>
</div>

<script>
    let loadedChatsData = {};

    document.getElementById('zipInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const contactListEl = document.getElementById('contactList');
        contactListEl.innerHTML = "<div style='padding:20px; text-align:center; color:#667781; font-size:13px;'>Memproses ZIP...</div>";

        try {
            const zip = new JSZip();
            const zipContent = await zip.loadAsync(file);
            loadedChatsData = {};
            contactListEl.innerHTML = "";

            for (let filename of Object.keys(zipContent.files)) {
                if (filename.endsWith('.txt') && !filename.startsWith('__MACOSX') && !filename.includes('/_')) {
                    const txtText = await zipContent.files[filename].async('string');
                    const parsedChats = parseWhatsAppTXT(txtText);

                    const cleanName = filename.replace('.txt', '').replace('WhatsApp Chat dengan ', '').replace(/[\/\\]/g, '_');
                    
                    loadedChatsData[cleanName] = parsedChats;
                    addContactItem(cleanName, parsedChats.length);
                }
            }

            if (Object.keys(loadedChatsData).length === 0) {
                contactListEl.innerHTML = "<div style='padding:20px; text-align:center; color:red; font-size:13px;'>File .txt tidak ditemukan.</div>";
            }
        } catch (err) {
            console.error(err);
            contactListEl.innerHTML = "<div style='padding:20px; text-align:center; color:red; font-size:13px;'>Gagal membaca ZIP.</div>";
        }
    });

    function parseWhatsAppTXT(text) {
        const lines = text.split(/\r?\n/);
        const chats = [];
        const regex = /^[\u200E\u200F]?[\[\(]?(\d{1,2}[\/.-]\d{1,2}[\/.-]\d{2,4}),?\s+(\d{1,2}[:.]\d{2}(?:[:.]\d{2})?(?:\s+[AP]M)?)[\\]?\]?\s*[-–]?\s*([^:]+):\s+(.*)$/i;

        let currentMessage = null;

        lines.forEach(line => {
            const match = line.match(regex);
            if (match) {
                if (currentMessage) chats.push(currentMessage);
                currentMessage = {
                    date: match[1].trim(),
                    time: match[2].trim(),
                    sender: match[3].trim(),
                    message: match[4].trim()
                };
            } else {
                if (currentMessage) {
                    currentMessage.message += "\n" + line.trim();
                }
            }
        });
        if (currentMessage) chats.push(currentMessage);
        return chats;
    }

    function addContactItem(name, totalMsg) {
        const contactListEl = document.getElementById('contactList');
        const item = document.createElement('div');
        item.className = 'contact-item';
        item.innerHTML = `
            <div class="contact-name">${name}</div>
            <div class="contact-meta">${totalMsg} pesan</div>
        `;
        item.addEventListener('click', () => {
            document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            renderChat(name, loadedChatsData[name]);
        });
        contactListEl.appendChild(item);
    }

    function renderChat(contactName, chats) {
        const headerEl = document.getElementById('chatHeader');
        const messagesEl = document.getElementById('chatMessages');
        const myName = document.getElementById('myNameInput').value.trim().toLowerCase();
        const myPosition = document.getElementById('myPositionSelect').value;

        headerEl.innerHTML = `<span>${contactName.toUpperCase()}</span>`;
        messagesEl.innerHTML = "";

        chats.forEach(chat => {
            const bubble = document.createElement('div');
            
            // Cek apakah pengirim adalah "Saya" berdasarkan input nama
            const isMe = myName !== "" && chat.sender.toLowerCase() === myName;
            
            if (myPosition === 'right') {
                bubble.className = `message-bubble ${isMe ? 'outgoing' : 'incoming'}`;
            } else {
                bubble.className = `message-bubble ${isMe ? 'incoming' : 'outgoing'}`;
            }

            bubble.innerHTML = `
                <div class="message-sender">${escapeHTML(chat.sender)}</div>
                <div>${escapeHTML(chat.message)}</div>
                <div class="message-time">${escapeHTML(chat.date)} ${escapeHTML(chat.time)}</div>
            `;
            messagesEl.appendChild(bubble);
        });
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHTML(str) {
        if (typeof str !== 'string') str = String(str);
        return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }
</script>

</body>
</html>
