<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Chat WhatsApp Pribadi</title>
    <style>
        :root {
            --bg-color: #efeae2;
            --sidebar-bg: #ffffff;
            --chat-bg: #efeae2;
            --outgoing-bg: #d9fdd3;
            --incoming-bg: #ffffff;
            --text-primary: #111b21;
            --text-secondary: #667781;
            --accent: #00a884;
            --border-color: #e9edef;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            height: 95vh;
            background: var(--sidebar-bg);
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 35%;
            background: #ffffff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px;
            background: #f0f2f5;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h2 {
            font-size: 18px;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 36px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #ffffff;
            font-size: 14px;
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box svg {
            position: absolute;
            left: 10px;
            top: 11px;
            width: 18px;
            height: 18px;
            fill: var(--text-secondary);
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .contact-item:hover, .contact-item.active {
            background: #f0f2f5;
        }

        .contact-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
        }

        .contact-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Chat Area Styling */
        .chat-area {
            flex: 65%;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
            background-image: radial-gradient(#d1d7db 0.75px, transparent 0.75px);
            background-size: 24px 24px;
        }

        .chat-header {
            padding: 12px 20px;
            background: #f0f2f5;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-bubble {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message-sender {
            font-size: 12px;
            font-weight: bold;
            color: #005c4b;
            margin-bottom: 3px;
        }

        .incoming {
            background: var(--incoming-bg);
            align-self: flex-start;
            border-top-left-radius: 0;
        }

        .outgoing {
            background: var(--outgoing-bg);
            align-self: flex-end;
            border-top-right-radius: 0;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-secondary);
            text-align: right;
            margin-top: 4px;
            float: right;
            margin-left: 10px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 20px;
        }

        .empty-state h3 {
            margin-bottom: 8px;
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Sidebar: Daftar Kontak & Pencarian Global -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Arsip Chat WhatsApp</h2>
            <div class="search-box">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="globalSearch" placeholder="Cari pesan di semua file JSON...">
            </div>
        </div>
        <div class="contact-list" id="contactList">
            <!-- Daftar kontak otomatis dimuat dari konfigurasi JSON -->
        </div>
    </div>

    <!-- Area Tampilan Chat -->
    <div class="chat-area">
        <div class="chat-header" id="chatHeader">
            <span>Pilih kontak di samping</span>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="empty-state">
                <h3>Belum ada chat yang dipilih</h3>
                <p>Silakan pilih salah satu kontak dari daftar di sebelah kiri untuk melihat riwayat pesan.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // --- DAFTAR FILE JSON KONTAK ANDA ---
    // Cukup tambahkan nama file JSON di sini setiap kali ada arsip baru yang diunggah ke GitHub!
    const availableJsonFiles = [
        "budi.json",
        "siti.json",
        "grup-kantor.json"
    ];

    let allLoadedData = {}; // Menyimpan data chat per file

    async function initViewer() {
        const contactListEl = document.getElementById('contactList');
        contactListEl.innerHTML = "<div style='padding:20px; text-align:center; color:#667781;'>Memuat data arsip...</div>";
        
        contactListEl.innerHTML = "";

        for (let filename of availableJsonFiles) {
            try {
                // Fetch file JSON dari folder (sesuaikan path foldernya jika ada, misal 'data_json/' + filename)
                const response = await fetch('data_json/' + filename);
                if (!response.ok) continue;
                
                const data = await response.json();
                allLoadedData[filename] = data;

                // Buat nama kontak bersih dari nama file
                const displayName = filename.replace('.json', '').replace(/-/g, ' ').toUpperCase();

                // Render item di sidebar
                const item = document.createElement('div');
                item.className = 'contact-item';
                item.innerHTML = `
                    <div>
                        <div class="contact-name">${displayName}</div>
                        <div class="contact-meta">${data.total_messages || data.chats.length} pesan terarsip</div>
                    </div>
                `;
                item.addEventListener('click', () => {
                    // Tandai aktif
                    document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    
                    renderChat(displayName, data.chats);
                });
                contactListEl.appendChild(item);

            } catch (err) {
                console.error("Gagal memuat file: " + filename, err);
            }
        }

        if (Object.keys(allLoadedData).length === 0) {
            contactListEl.innerHTML = "<div style='padding:20px; text-align:center; color:red;'>File JSON tidak ditemukan. Pastikan sudah dimasukkan ke folder 'data_json/'.</div>";
        }
    }

    function renderChat(contactName, chats) {
        const headerEl = document.getElementById('chatHeader');
        const messagesEl = document.getElementById('chatMessages');

        headerEl.innerHTML = `<span>${contactName}</span> <span style="font-size:12px; color:#667781;">${chats.length} Pesan</span>`;
        messagesEl.innerHTML = "";

        // Batasi render awal atau render semua jika ringan
        chats.forEach(chat => {
            const bubble = document.createElement('div');
            // Deteksi sederhana pengirim (misal asumsi pengirim utama adalah Anda atau kontak lain)
            // Di sini kita tampilkan nama pengirim jika dalam grup, atau buat styling berbeda
            bubble.className = 'message-bubble incoming'; 
            
            bubble.innerHTML = `
                <div class="message-sender">${chat.sender}</div>
                <div>${escapeHTML(chat.message)}</div>
                <div class="message-time">${chat.date} ${chat.time}</div>
            `;
            messagesEl.appendChild(bubble);
        });

        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }

    // Fitur Global Search di Sidebar
    document.getElementById('globalSearch').addEventListener('input', function(e) {
        const keyword = e.target.value.toLowerCase();
        const contactListEl = document.getElementById('contactList');
        
        // Filter atau sorot kontak yang mengandung keyword pencarian
        // (Bisa dikembangkan lebih lanjut untuk menampilkan hasil pencarian instan)
    });

    // Jalankan saat halaman dibuka
    initViewer();
</script>

</body>
</html>
